name: Build Android APK

on:
  push:
    branches:
      - main  # Il workflow si attiva quando fai push su main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest  # Macchina virtuale Linux nel cloud

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Imposta JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Rendi eseguibile Gradle
        run: chmod +x gradlew

      - name: Compila l'APK (Debug)
        run: ./gradlew assembleDebug

      - name: Carica l'APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
